name: Update Metrics
on:
  schedule: [{cron: "30 4 * * 1,4"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Carter4242
          template: classic
          # NOTE: no plugin_activity ("Recent activity") — GitHub removed
          # commit data from the public events API, which crashes it
          base: header, activity, metadata
          base_indepth: yes
          config_timezone: America/New_York
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 12
