name: Update Stats
on:
  schedule: [{cron: "30 4 * * 1,4"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Build from source: 2.0.1 release binary predates the fix for GitHub's
      # /stats/contributors returning null authors (deleted accounts)
      - uses: actions/checkout@v4
        with:
          repository: jstrieb/github-stats
          ref: ef574fae2ce8311f3e1ebb43e07c0c0fae0a41b6
          path: github-stats-src
      - uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29  # v2
        with:
          version: 0.16.0
      - name: Build github-stats
        run: cd github-stats-src && zig build
      - name: Generate images
        run: |
          mkdir -p generated
          ./github-stats-src/zig-out/bin/github-stats
        env:
          ACCESS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OVERVIEW_TEMPLATE: templates/overview.svg
          LANGUAGES_TEMPLATE: templates/languages.svg
          OVERVIEW_OUTPUT_FILE: generated/overview.svg
          LANGUAGES_OUTPUT_FILE: generated/languages.svg
          # Only count my own repos: stars/forks/languages otherwise include
          # full totals of every third-party repo ever contributed to
          EXCLUDE_REPOS: "50516021/*, Go-20255/*, JerBouma/*, MrQuackDuck/*, akotsch-21/*, froobynooby/*"
          SILENT: "true"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated
          git commit -m "Update generated stats" || echo "No changes"
          git push
